# Smithery MCP Server Configuration
# https://smithery.ai/docs/config

name: mcp-sputnikx-market
displayName: SputnikX Commerce & EU Trade Analytics
description: |
  Access EU trade data (28M+ Eurostat COMEXT records, 27 countries, 1988-2025),
  product catalog (heating pellets, wood products), real-time pricing,
  warehouse availability, quotes, orders, and fuel calculator.
version: 1.0.0
author: SputnikX
license: MIT
homepage: https://sputnikx.xyz

icon: https://sputnikx.xyz/img/logo-icon.png

tags:
  - commerce
  - trade
  - eu
  - eurostat
  - wood
  - heating
  - analytics
  - latvia

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        title: API Key
        description: "SputnikX API key (sk_live_...)"
      apiUrl:
        type: string
        title: API URL
        description: "Base URL (default: https://sputnikx.xyz)"
        default: "https://sputnikx.xyz"
      tenant:
        type: string
        title: Tenant
        description: "Tenant slug"
        default: "siltums"
        enum:
          - siltums
          - woodpoint
    required:
      - apiKey
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['-y', 'mcp-sputnikx-market'],
      env: {
        SPUTNIKX_API_KEY: config.apiKey,
        ...(config.apiUrl && { SPUTNIKX_API_URL: config.apiUrl }),
        ...(config.tenant && { SPUTNIKX_TENANT: config.tenant }),
      },
    })
